---
# ==============================================================================
# inventory — Proxmoxi hostid
# ===========================================================================
# Asendage näidisväärtused oma tegelike Proxmoxi hosti andmetega.
# playbook käivitab qm/pveum otse Proxmoxi hostil,
# nii et Ansible loob ühenduse SSH kaudu root'ina (või privilegeeritud kasutajana).
# ============================================================================================

all:
  children:
    proxmox:
      hosts:
        pve1:
          ansible_host: 192.168.1.10       # pane oma proxmoxi ip
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_rsa   # voi kasuta ansible_password
